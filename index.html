<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yeon the killer of blue zombie</title>
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.webmanifest">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <!-- 메인 화면 UI 버튼들 -->
        <div id="main-menu-buttons" class="main-menu-overlay" hidden>
            <button id="start-btn" type="button" class="pixel-btn primary">START GAME</button>
            <button id="install-btn" type="button" class="pixel-btn secondary" hidden>INSTALL APP</button>
            <button id="download-btn" type="button" class="pixel-btn secondary">DOWNLOAD GAME</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
