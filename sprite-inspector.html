<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스프라이트 매핑 검증 도구</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 { color: #e74c3c; margin-bottom: 20px; text-align: center; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* 파일 업로드 영역 */
        .upload-section {
            background: #16213e;
            border: 3px dashed #e74c3c;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .upload-section input[type="file"] {
            display: none;
        }
        .upload-label {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .upload-label:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        /* 보스 선택 탭 */
        .boss-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .boss-tab {
            background: #0f3460;
            border: 2px solid #e94560;
            color: #eee;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .boss-tab.active {
            background: #e94560;
            color: white;
        }
        .boss-tab:hover:not(.active) {
            background: #1a4a7a;
        }
        
        /* 메인 디스플레이 영역 */
        .display-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 900px) {
            .display-area { grid-template-columns: 1fr; }
        }
        
        /* 캔버스 컨테이너 */
        .canvas-container {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
        }
        .canvas-container h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 14px;
        }
        canvas {
            background: #0a0a0a;
            border: 1px solid #333;
            max-width: 100%;
            image-rendering: pixelated;
        }
        
        /* 매핑 정보 패널 */
        .info-panel {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            max-height: 500px;
            overflow-y: auto;
        }
        .info-panel h3 {
            color: #e94560;
            margin-bottom: 15px;
        }
        
        /* 상태(행) 섹션 */
        .state-section {
            background: #0f3460;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .state-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .state-name {
            font-weight: bold;
            color: #e94560;
        }
        .state-coords {
            font-size: 12px;
            color: #aaa;
        }
        
        /* 프레임 리스트 */
        .frame-list {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .frame-item {
            background: #1a1a2e;
            border: 1px solid #e94560;
            border-radius: 3px;
            padding: 5px 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .frame-item:hover {
            background: #e94560;
        }
        .frame-item.active {
            background: #e74c3c;
            border-color: #fff;
        }
        
        /* 컨트롤 패널 */
        .controls {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .controls h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        .control-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-item label {
            font-size: 12px;
            color: #aaa;
        }
        .control-item input[type="number"] {
            width: 60px;
            background: #0a0a0a;
            border: 1px solid #e94560;
            color: #eee;
            padding: 5px;
            border-radius: 3px;
        }
        .control-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        button:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        /* 에러/경고 메시지 */
        .message {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .message.error {
            background: #c0392b;
            border: 1px solid #e74c3c;
        }
        .message.success {
            background: #27ae60;
            border: 1px solid #2ecc71;
        }
        .message.warning {
            background: #f39c12;
            border: 1px solid #e67e22;
        }
        
        /* 그리드 오버레이 */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        /* 애니메이션 프리뷰 */
        .animation-preview {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .animation-preview h3 {
            color: #e94560;
            margin-bottom: 10px;
        }
        #animCanvas {
            background: #0a0a0a;
            border: 1px solid #333;
            image-rendering: pixelated;
        }
        
        /* JSON 출력 */
        .json-output {
            background: #0a0a0a;
            border: 2px solid #0f3460;
            border-radius: 10px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            color: #2ecc71;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 스프라이트 매핑 검증 도구</h1>
        
        <!-- 파일 업로드 -->
        <div class="upload-section">
            <input type="file" id="spriteFile" accept="image/png,image/jpeg">
            <label for="spriteFile" class="upload-label">📁 스프라이트 이미지 선택 (PNG/JPEG)</label>
            <p style="margin-top: 10px; color: #aaa; font-size: 13px;">
                청토끼 보스, 보스2, 보스킹 이미지를 선택하세요
            </p>
        </div>
        
        <!-- 메시지 영역 -->
        <div id="messageArea"></div>
        
        <!-- 보스 선택 탭 -->
        <div class="boss-tabs">
            <div class="boss-tab active" data-boss="original">기존 보스</div>
            <div class="boss-tab" data-boss="boss2">보스2 (3행6열)</div>
            <div class="boss-tab" data-boss="king">보스킹 (3행6열)</div>
        </div>
        
        <!-- 컨트롤 패널 -->
        <div class="controls">
            <h3>🔧 그리드 설정</h3>
            <div class="control-group">
                <div class="control-item">
                    <label>행 수:</label>
                    <input type="number" id="rowCount" value="3" min="1" max="10">
                </div>
                <div class="control-item">
                    <label>열 수:</label>
                    <input type="number" id="colCount" value="6" min="1" max="10">
                </div>
                <div class="control-item">
                    <label>프레임 너비:</label>
                    <input type="number" id="frameWidth" value="100" min="10">
                </div>
                <div class="control-item">
                    <label>프레임 높이:</label>
                    <input type="number" id="frameHeight" value="116" min="10">
                </div>
                <div class="control-item">
                    <label>시작 Y:</label>
                    <input type="number" id="startY" value="10" min="0">
                </div>
                <div class="control-item">
                    <label>간격:</label>
                    <input type="number" id="spacing" value="0" min="0">
                </div>
                <div class="control-item">
                    <input type="checkbox" id="showGrid" checked>
                    <label>그리드 표시</label>
                </div>
                <button onclick="applyGridSettings()">설정 적용</button>
                <button onclick="autoDetectGrid()">🔍 자동 감지</button>
            </div>
        </div>
        
        <!-- 메인 디스플레이 -->
        <div class="display-area">
            <!-- 원본 이미지 + 그리드 오버레이 -->
            <div class="canvas-container">
                <h3>📊 원본 이미지 + 매핑 그리드</h3>
                <div style="position: relative; display: inline-block;">
                    <canvas id="sourceCanvas"></canvas>
                    <canvas id="gridCanvas" class="grid-overlay"></canvas>
                </div>
            </div>
            
            <!-- 매핑 정보 -->
            <div class="info-panel">
                <h3>📋 현재 매핑 정보</h3>
                <div id="mappingInfo"></div>
            </div>
        </div>
        
        <!-- 애니메이션 프리뷰 -->
        <div class="animation-preview">
            <h3>🎬 애니메이션 프리뷰</h3>
            <div class="control-group" style="margin-bottom: 10px;">
                <div class="control-item">
                    <label>상태:</label>
                    <select id="animState" style="background: #0a0a0a; color: #eee; border: 1px solid #e94560; padding: 5px;">
                        <option value="WALK">WALK (걷기)</option>
                        <option value="ATTACK">ATTACK (공격)</option>
                        <option value="DEAD">DEAD (사망)</option>
                        <option value="HIT">HIT (피격)</option>
                    </select>
                </div>
                <div class="control-item">
                    <label>속도:</label>
                    <input type="number" id="animSpeed" value="200" min="50" max="1000">
                    <label>ms</label>
                </div>
                <button onclick="toggleAnimation()" id="animBtn">▶️ 재생</button>
            </div>
            <canvas id="animCanvas" width="300" height="300"></canvas>
        </div>
        
        <!-- JSON 출력 -->
        <div class="controls">
            <h3>📄 매핑 JSON 코드</h3>
            <div id="jsonOutput" class="json-output">// 이미지를 업로드하면 매핑 코드가 여기에 표시됩니다</div>
        </div>
    </div>

    <script>
        // 스프라이트 매핑 정의
        const SPRITE_MAPS = {
            original: {
                name: '기존 보스 (청토끼 보스.png)',
                rows: 3,
                cols: 6,
                map: {
                    WALK:   { y: 10,  h: 116, frames: [{x:215,w:87},{x:345,w:87},{x:476,w:87},{x:593,w:97},{x:734,w:88},{x:867,w:87}] },
                    ATTACK: { y: 144, h: 119, frames: [{x:205,w:127},{x:340,w:124},{x:465,w:148},{x:615,w:132},{x:753,w:92},{x:872,w:89}] },
                    DEAD:   { y: 270, h: 114, frames: [{x:213,w:101},{x:336,w:100},{x:448,w:149},{x:608,w:118},{x:730,w:128},{x:867,w:88}] }
                }
            },
            boss2: {
                name: '보스2 (청토끼 보스2.png) - 3x6 (2400x840)',
                rows: 3,
                cols: 6,
                map: {
                    WALK:   { y: 0,   h: 280, frames: [{x:400,w:333},{x:733,w:333},{x:1066,w:333},{x:1399,w:333},{x:1732,w:333},{x:2065,w:333}] },
                    ATTACK: { y: 280, h: 280, frames: [{x:400,w:333},{x:733,w:333},{x:1066,w:333},{x:1399,w:333},{x:1732,w:333},{x:2065,w:333}] },
                    DEAD:   { y: 560, h: 280, frames: [{x:400,w:333},{x:733,w:333},{x:1066,w:333},{x:1399,w:333},{x:1732,w:333},{x:2065,w:333}] }
                }
            },
            king: {
                name: '보스킹 (청토끼 킹.png) - 3x7 (첫 열 텍스트 제외)',
                rows: 3,
                cols: 7,
                map: {
                    WALK:   { y: 0,   h: 140, frames: [{x:100,w:120},{x:240,w:120},{x:380,w:120},{x:520,w:120},{x:660,w:120},{x:800,w:120}] },
                    ATTACK: { y: 140, h: 140, frames: [{x:100,w:120},{x:240,w:120},{x:380,w:120},{x:520,w:120},{x:660,w:120},{x:800,w:120}] },
                    DEAD:   { y: 280, h: 140, frames: [{x:100,w:120},{x:240,w:120},{x:380,w:120},{x:520,w:120},{x:660,w:120},{x:800,w:120}] }
                }
            }
        };

        let currentImage = null;
        let currentBoss = 'original';
        let animationId = null;
        let isPlaying = false;
        let currentFrame = 0;

        // 캔버스 설정
        const sourceCanvas = document.getElementById('sourceCanvas');
        const gridCanvas = document.getElementById('gridCanvas');
        const animCanvas = document.getElementById('animCanvas');
        const sourceCtx = sourceCanvas.getContext('2d');
        const gridCtx = gridCanvas.getContext('2d');
        const animCtx = animCanvas.getContext('2d');

        // 파일 업로드 처리
        document.getElementById('spriteFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    currentImage = img;
                    displayImage();
                    showMessage('이미지 로드 완료: ' + file.name, 'success');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 보스 탭 선택
        document.querySelectorAll('.boss-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.boss-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentBoss = this.dataset.boss;
                
                const config = SPRITE_MAPS[currentBoss];
                const map = config.map;
                
                // 입력 필드 업데이트
                document.getElementById('rowCount').value = config.rows;
                document.getElementById('colCount').value = config.cols;
                
                // 첫 번째 상태의 프레임 정보로 나머지 설정 추정
                const firstState = Object.values(map)[0];
                if (firstState) {
                    const firstFrame = firstState.frames[0];
                    if (firstFrame) {
                        document.getElementById('frameWidth').value = firstFrame.w;
                        document.getElementById('frameHeight').value = firstState.h;
                        document.getElementById('startY').value = firstState.y;
                        // 간격 계산 (두 번째 프레임이 있으면)
                        if (firstState.frames[1]) {
                            const spacing = firstState.frames[1].x - firstFrame.x - firstFrame.w;
                            document.getElementById('spacing').value = Math.max(0, spacing);
                        }
                    }
                }
                
                updateMappingInfo();
                drawGridOverlay();
                updateJsonOutput();
                
                // 이미지가 업로드된 상태면 메시지 표시
                if (currentImage) {
                    showMessage(`${config.name} 매핑이 적용되었습니다. 설정 적용 버튼을 눌러 그리드를 업데이트하세요.`, 'success');
                }
            });
        });

        // 이미지 표시
        function displayImage() {
            if (!currentImage) return;
            
            sourceCanvas.width = currentImage.width;
            sourceCanvas.height = currentImage.height;
            gridCanvas.width = currentImage.width;
            gridCanvas.height = currentImage.height;
            
            sourceCtx.drawImage(currentImage, 0, 0);
            drawGridOverlay();
        }

        // 그리드 오버레이 그리기
        function drawGridOverlay() {
            if (!currentImage) return;
            
            gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            
            if (!document.getElementById('showGrid').checked) return;
            
            const config = SPRITE_MAPS[currentBoss];
            const map = config.map;
            
            // 각 상태별 프레임 그리기
            Object.entries(map).forEach(([state, data]) => {
                const y = data.y;
                const h = data.h;
                
                data.frames.forEach((frame, index) => {
                    const x = frame.x;
                    const w = frame.w;
                    
                    // 테두리 그리기
                    gridCtx.strokeStyle = state === 'WALK' ? '#2ecc71' : 
                                         state === 'ATTACK' ? '#e74c3c' : 
                                         state === 'DEAD' ? '#9b59b6' : '#f39c12';
                    gridCtx.lineWidth = 2;
                    gridCtx.strokeRect(x, y, w, h);
                    
                    // 프레임 번호 표시
                    gridCtx.fillStyle = 'rgba(0,0,0,0.7)';
                    gridCtx.fillRect(x, y, 25, 20);
                    gridCtx.fillStyle = '#fff';
                    gridCtx.font = '12px monospace';
                    gridCtx.fillText(index + 1, x + 5, y + 14);
                    
                    // 상태 라벨 (첫 프레임에만)
                    if (index === 0) {
                        gridCtx.fillStyle = 'rgba(0,0,0,0.8)';
                        gridCtx.fillRect(x, y + h - 20, 60, 20);
                        gridCtx.fillStyle = gridCtx.strokeStyle;
                        gridCtx.font = 'bold 11px monospace';
                        gridCtx.fillText(state, x + 5, y + h - 6);
                    }
                });
            });
        }

        // 매핑 정보 업데이트
        function updateMappingInfo() {
            const config = SPRITE_MAPS[currentBoss];
            const map = config.map;
            
            let html = `<div style="margin-bottom:15px; color:#2ecc71;">${config.name}</div>`;
            
            Object.entries(map).forEach(([state, data]) => {
                html += `
                    <div class="state-section">
                        <div class="state-header">
                            <span class="state-name">${state}</span>
                            <span class="state-coords">y=${data.y}, h=${data.h}, frames=${data.frames.length}</span>
                        </div>
                        <div class="frame-list">
                            ${data.frames.map((f, i) => `
                                <div class="frame-item" onclick="previewFrame('${state}', ${i})" title="x=${f.x}, w=${f.w}">
                                    ${i+1}<br><small style="color:#aaa;">${f.w}px</small>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('mappingInfo').innerHTML = html;
        }

        // 프레임 미리보기
        function previewFrame(state, frameIndex) {
            if (!currentImage) {
                showMessage('먼저 이미지를 업로드하세요', 'error');
                return;
            }
            
            const config = SPRITE_MAPS[currentBoss];
            const data = config.map[state];
            const frame = data.frames[frameIndex];
            
            // 프레임 하이라이트
            document.querySelectorAll('.frame-item').forEach((el, i) => {
                el.classList.remove('active');
            });
            event.target.closest('.frame-item').classList.add('active');
            
            // 애니메이션 캔버스에 표시
            animCanvas.width = frame.w * 2;
            animCanvas.height = data.h * 2;
            
            animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);
            animCtx.imageSmoothingEnabled = false;
            animCtx.drawImage(
                currentImage,
                frame.x, data.y, frame.w, data.h,
                0, 0, animCanvas.width, animCanvas.height
            );
        }

        // 애니메이션 토글
        function toggleAnimation() {
            if (isPlaying) {
                stopAnimation();
            } else {
                startAnimation();
            }
        }

        function startAnimation() {
            if (!currentImage) {
                showMessage('먼저 이미지를 업로드하세요', 'error');
                return;
            }
            
            isPlaying = true;
            document.getElementById('animBtn').textContent = '⏸️ 정지';
            
            const state = document.getElementById('animState').value;
            const speed = parseInt(document.getElementById('animSpeed').value);
            const config = SPRITE_MAPS[currentBoss];
            const data = config.map[state] || config.map.WALK;
            
            currentFrame = 0;
            
            function animate() {
                if (!isPlaying) return;
                
                const frame = data.frames[currentFrame];
                animCanvas.width = frame.w * 2;
                animCanvas.height = data.h * 2;
                
                animCtx.clearRect(0, 0, animCanvas.width, animCanvas.height);
                animCtx.imageSmoothingEnabled = false;
                animCtx.drawImage(
                    currentImage,
                    frame.x, data.y, frame.w, data.h,
                    0, 0, animCanvas.width, animCanvas.height
                );
                
                currentFrame = (currentFrame + 1) % data.frames.length;
                
                setTimeout(() => {
                    animationId = requestAnimationFrame(animate);
                }, speed);
            }
            
            animate();
        }

        function stopAnimation() {
            isPlaying = false;
            document.getElementById('animBtn').textContent = '▶️ 재생';
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        // JSON 출력 업데이트
        function updateJsonOutput() {
            const config = SPRITE_MAPS[currentBoss];
            const json = `const ${currentBoss === 'boss2' ? 'BOSS2_SPRITE_MAP' : 
                          currentBoss === 'king' ? 'BOSS_KING_SPRITE_MAP' : 'BOSS_SPRITE_MAP'} = {
${Object.entries(config.map).map(([state, data]) => `    ${state}: {
        y: ${data.y}, h: ${data.h},
        frames: [
${data.frames.map(f => `            { x: ${f.x}, w: ${f.w} }`).join(',\n')}
        ]
    }`).join(',\n')}
};`;
            document.getElementById('jsonOutput').textContent = json;
        }

        // 설정 적용
        function applyGridSettings() {
            if (!currentImage) {
                showMessage('먼저 이미지를 업로드하세요', 'error');
                return;
            }
            
            const rows = parseInt(document.getElementById('rowCount').value);
            const cols = parseInt(document.getElementById('colCount').value);
            const frameW = parseInt(document.getElementById('frameWidth').value);
            const frameH = parseInt(document.getElementById('frameHeight').value);
            const startY = parseInt(document.getElementById('startY').value);
            const spacing = parseInt(document.getElementById('spacing').value);
            
            // 자동 매핑 생성
            const states = ['WALK', 'ATTACK', 'DEAD', 'HIT'];
            const newMap = {};
            
            for (let i = 0; i < Math.min(rows, states.length); i++) {
                const y = startY + i * (frameH + spacing);
                const frames = [];
                
                for (let j = 0; j < cols; j++) {
                    const x = j * (frameW + spacing);
                    frames.push({ x, w: frameW });
                }
                
                newMap[states[i]] = { y, h: frameH, frames };
            }
            
            // 임시로 현재 보스 매핑 업데이트
            SPRITE_MAPS[currentBoss].map = newMap;
            SPRITE_MAPS[currentBoss].rows = rows;
            SPRITE_MAPS[currentBoss].cols = cols;
            
            updateMappingInfo();
            drawGridOverlay();
            updateJsonOutput();
            showMessage('설정이 적용되었습니다', 'success');
        }

        // 자동 감지 (간단한 버전)
        function autoDetectGrid() {
            if (!currentImage) {
                showMessage('먼저 이미지를 업로드하세요', 'error');
                return;
            }
            
            const w = currentImage.width;
            const h = currentImage.height;
            const config = SPRITE_MAPS[currentBoss];
            
            // 열 수에 따른 프레임 너비 추정
            const estimatedFrameW = Math.floor(w / config.cols);
            const estimatedFrameH = Math.floor(h / config.rows);
            
            document.getElementById('frameWidth').value = estimatedFrameW;
            document.getElementById('frameHeight').value = estimatedFrameH;
            
            showMessage(`감지된 프레임 크기: ${estimatedFrameW}x${estimatedFrameH}px`, 'success');
        }

        // 메시지 표시
        function showMessage(text, type) {
            const area = document.getElementById('messageArea');
            area.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => { area.innerHTML = ''; }, 3000);
        }

        // 초기화
        updateMappingInfo();
        updateJsonOutput();
    </script>
</body>
</html>
